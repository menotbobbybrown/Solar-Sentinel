[paths]
data = /data/grafana
logs = /data/grafana/logs
plugins = /data/grafana/plugins

[server]
http_addr = 0.0.0.0
http_port = 3000

[security]
admin_user = admin
admin_password = admin

[auth.anonymous]
enabled = false

[provisioning]
datasources = /etc/grafana/provisioning/datasources
dashboards = /etc/grafana/provisioning/dashboards

[dashboards]
default_home_dashboard_path = /etc/grafana/dashboards/solar_dashboard.json
