# Grafana Dashboard Provisioning Configuration

apiVersion: 1

providers:
  - name: 'Solar Sentinel Dashboards'
    orgId: 1
    folder: 'Solar Sentinel'
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      # Also look in data directory for custom dashboards
      foldersFromFilesStructure: true
