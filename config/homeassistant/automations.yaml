- id: energy_guard_lock_washing_machine
  alias: "Energy Guard: Lock Washing Machine"
  trigger:
    - platform: mqtt
      topic: "home/appliances/washing_machine/lock"
  action:
    - service: >
        {% if trigger.payload == 'LOCK' %}
          switch.turn_off
        {% else %}
          switch.turn_on
        {% endif %}
      target:
        entity_id: switch.washing_machine

