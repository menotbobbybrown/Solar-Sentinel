# =============================================================================
# Solar-Sentinel-AIO v3 Phase 5 - Home Assistant Automations
# Includes standard energy guard + EVA-specific automations
# =============================================================================

# =============================================================================
# SECTION 1: APPLIANCE LOCK AUTOMATIONS (EVA-Aware)
# =============================================================================

- id: energy_guard_lock_washing_machine
  alias: "Energy Guard: Lock Washing Machine"
  trigger:
    - platform: mqtt
      topic: "solar/appliance/washing_machine/lock"
  action:
    - service: >
        {% if trigger.payload == 'LOCK' %}
          switch.turn_off
        {% else %}
          switch.turn_on
        {% endif %}
      target:
        entity_id: switch.washing_machine

