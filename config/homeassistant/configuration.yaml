default_config:

# Text to speech
tts:
  - platform: google_translate

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1

mqtt:
  broker: localhost

influxdb:
  api_version: 2
  ssl: false
  host: localhost
  port: 8086
  token: my-token
  organization: my-org
  bucket: system_state

